<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Profile</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="top-menu">
    <a href="#" data-page="my-profile.html">My Profile</a>
    <a href="#" data-page="my-jobs.html">My Jobs</a>
    <a href="#" data-page="post-a-job.html">Post a Job</a>
    <a href="#" data-page="allocate-jobs.html">Allocate Jobs</a>
    <a href="#" data-page="available-jobs.html">Available Jobs</a>
    <a href="#" data-page="messages.html">Messages</a>
    <a href="#" data-page="settings.html">⚙️</a>
    <a href="#" id="sign-out">Sign Out</a>

    <select id="role-dropdown">
      <option value="customer">Customer</option>
      <option value="provider">Provider</option>
      <option value="agent">Agent</option>
    </select>
  </div>

  <div class="page-content">
    <h1 id="profile-name">Loading profile...</h1>

    <p><strong>Account type:</strong> <span id="profile-role">Loading...</span></p>

    <h2>Description</h2>
    <p id="profile-description">Loading...</p>

    <div id="agent-section" style="display: none;">

      <br><br>

      <h2>Add Contractor</h2>

      <input
        type="text"
        id="contractor-email"
        placeholder="Enter contractor email"
      >

      <button id="find-user-button">
        Submit
      </button>

      <br><br>

      <div id="user-result"></div>

      <br><br>

      <h2>My Contractors</h2>

      <div id="contractors-list"></div>

    </div>
  </div>

  <script src="navigation.js"></script>

  <script>
    let foundContractorUserId = null;

    async function loadMyProfile() {
      const user_id = localStorage.getItem("user_id");

      const profileName = document.getElementById("profile-name");
      const profileRole = document.getElementById("profile-role");
      const profileDescription = document.getElementById("profile-description");

      if (!user_id) {
        profileName.textContent = "Profile could not be loaded.";
        profileRole.textContent = "";
        profileDescription.textContent = "";
        return;
      }

      const response = await fetch("https://ofxmxfwibvhvlhgirxfd.supabase.co/functions/v1/get-my-profile", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          user_id: user_id
        })
      });

      if (!response.ok) {
        profileName.textContent = "Profile could not be loaded.";
        profileRole.textContent = "";
        profileDescription.textContent = "";
        return;
      }

      const data = await response.json();

      profileName.textContent = data.name || "Name not found";
      profileRole.textContent = data.role || "Role not found";
      profileDescription.textContent = data.description || "No description added yet.";
    }

    async function findUser() {
      const email = document.getElementById("contractor-email").value;
      const result = document.getElementById("user-result");

      foundContractorUserId = null;

      if (!email) {
        result.textContent = "Please enter an email address.";
        return;
      }

      const response = await fetch("https://ofxmxfwibvhvlhgirxfd.supabase.co/functions/v1/find-user", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          email: email
        })
      });

      const data = await response.json();

      if (!response.ok || !data.found) {
        result.textContent = "User not found.";
        return;
      }

      foundContractorUserId = data.user.user_id;

      result.innerHTML = `
        <p><strong>Name:</strong> ${data.user.name}</p>
        <p><strong>Email:</strong> ${data.user.email}</p>
        <p><strong>Role:</strong> ${data.user.role}</p>

        <button id="add-contractor-button">
          Add Contractor
        </button>

        <br><br>

        <div id="add-contractor-message"></div>
      `;

      document
        .getElementById("add-contractor-button")
        .addEventListener("click", addContractor);
    }

    async function addContractor() {
      const agent_id = localStorage.getItem("user_id");
      const message = document.getElementById("add-contractor-message");

      if (!agent_id || !foundContractorUserId) {
        message.textContent = "Contractor could not be added.";
        return;
      }

      const response = await fetch("https://ofxmxfwibvhvlhgirxfd.supabase.co/functions/v1/add-contractor", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          agent_id: agent_id,
          user_id: foundContractorUserId
        })
      });

      if (!response.ok) {
        message.textContent = "Contractor could not be added.";
        return;
      }

      message.textContent = "Contractor added successfully.";
      loadContractors();
    }

    async function loadContractors() {
      const agent_id = localStorage.getItem("user_id");
      const contractorsList = document.getElementById("contractors-list");

      if (!agent_id) {
        contractorsList.textContent = "Could not load contractors.";
        return;
      }

      const response = await fetch("https://ofxmxfwibvhvlhgirxfd.supabase.co/functions/v1/get-contractors", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          agent_id: agent_id
        })
      });

      if (!response.ok) {
        contractorsList.textContent = "Could not load contractors.";
        return;
      }

      const data = await response.json();

      if (!data.contractors || data.contractors.length === 0) {
        contractorsList.textContent = "No contractors added yet.";
        return;
      }

      contractorsList.innerHTML = "";

      data.contractors.forEach(function (contractor) {
        const contractorDiv = document.createElement("div");

        contractorDiv.innerHTML = `
          <p><strong>Name:</strong> ${contractor.user.name}</p>
          <p><strong>Email:</strong> ${contractor.user.email}</p>
          <p><strong>Role:</strong> ${contractor.user.role}</p>
          <hr>
        `;

        contractorsList.appendChild(contractorDiv);
      });
    }

    document.addEventListener("DOMContentLoaded", function () {
      const role = localStorage.getItem("selectedRole");

      loadMyProfile();

      if (role === "agent") {
        document.getElementById("agent-section").style.display = "block";
        loadContractors();
      }

      document
        .getElementById("find-user-button")
        .addEventListener("click", findUser);
    });
  </script>

</body>
</html>
