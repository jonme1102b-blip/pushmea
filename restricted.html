<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Unavailable</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="top-menu">
    <a href="#" data-page="my-profile.html">My Profile</a>
    <a href="#" data-page="my-jobs.html">My Jobs</a>
    <a href="#" data-page="post-a-job.html">Post a Job</a>
    <a href="#" data-page="allocate-jobs.html">Allocate Jobs</a>
    <a href="#" data-page="available-jobs.html">Available Jobs</a>
    <a href="#" data-page="messages.html">Messages</a>
    <a href="#" data-page="settings.html">⚙️</a>
    <a href="#">Sign Out</a>

    <select id="role-dropdown">
      <option value="customer">Customer</option>
      <option value="provider">Provider</option>
      <option value="agent">Agent</option>
    </select>
  </div>

  <div class="page-content">
    <h1>Feature Unavailable</h1>
    <p id="message"></p>
  </div>

  <script src="navigation.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const page = params.get("page");
    const role = params.get("role");

    document.getElementById("message").innerText =
      `The page "${page}" is not available for the ${role} role.`;
  </script>

</body>
</html>
