<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Messages</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="top-menu">
    <a href="#" data-page="my-profile.html">My Profile</a>
    <a href="#" data-page="my-jobs.html">My Jobs</a>
    <a href="#" data-page="post-a-job.html">Post a Job</a>
    <a href="#" data-page="allocate-jobs.html">Allocate Jobs</a>
    <a href="#" data-page="available-jobs.html">Available Jobs</a>
    <a href="#" data-page="messages.html">Messages</a>
    <a href="#" data-page="settings.html">⚙️</a>
    <a href="#" id="sign-out">Sign Out</a>

    <select id="role-dropdown">
      <option value="customer">Customer</option>
      <option value="provider">Provider</option>
      <option value="agent">Agent</option>
    </select>
  </div>

  <div class="page-content">
    <h1>Messages</h1>

    <div id="message-output">
      <p>This is a dummy messages page.</p>
    </div>
  </div>

  <script src="navigation.js"></script>

  <script>
    const appliedJobId =
      localStorage.getItem("applied_job_id");

    if (appliedJobId) {

      document.getElementById(
        "message-output"
      ).innerHTML = `
        <p><strong>Job ID:</strong> ${appliedJobId}</p>
        <p>Apply for job ${appliedJobId}.</p>
      `;
    }
  </script>

</body>
</html>
