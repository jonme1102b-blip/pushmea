<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Messages</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="top-menu">
    <a href="#" data-page="my-profile.html">My Profile</a>
    <a href="#" data-page="my-jobs.html">My Jobs</a>
    <a href="#" data-page="post-a-job.html">Post a Job</a>
    <a href="#" data-page="allocate-jobs.html">Allocate Jobs</a>
    <a href="#" data-page="available-jobs.html">Available Jobs</a>
    <a href="#" data-page="messages.html">Messages</a>
    <a href="#" data-page="settings.html">⚙️</a>
    <a href="#" id="sign-out">Sign Out</a>

    <select id="role-dropdown">
      <option value="customer">Customer</option>
      <option value="provider">Provider</option>
      <option value="agent">Agent</option>
    </select>
  </div>

  <div class="page-content">

    <h1>Messages</h1>

    <div id="bid-region"></div>

    <hr>

    <button onclick="loadMyMessages()">
      Load My Messages
    </button>

    <div id="messages-output"></div>

  </div>

  <script src="navigation.js"></script>

  <script>

    const appliedJobId =
      localStorage.getItem("applied_job_id");

    if (appliedJobId) {

      document.getElementById(
        "bid-region"
      ).innerHTML = `

        <h2>Bid for Job ${appliedJobId}</h2>

        <textarea
          id="bid-message"
          rows="10"
          cols="80"
          placeholder="Write your bid message here..."
        ></textarea>

        <br><br>

        <button onclick="submitBid()">
          Bid for Job ${appliedJobId}
        </button>

        <hr>
      `;
    }

    async function submitBid() {

      const bidMessage =
        document.getElementById("bid-message").value;

      alert(
        "Bid submission wiring comes next."
      );
    }

    async function loadMyMessages() {

      document.getElementById(
        "messages-output"
      ).innerHTML = `
        <p>Messages loading will be added next.</p>
      `;
    }

  </script>

</body>
</html>
