<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Allocate Jobs</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="top-menu">
    <a href="#" data-page="my-profile.html">My Profile</a>
    <a href="#" data-page="my-jobs.html">My Jobs</a>
    <a href="#" data-page="post-a-job.html">Post a Job</a>
    <a href="#" data-page="allocate-jobs.html">Allocate Jobs</a>
    <a href="#" data-page="available-jobs.html">Available Jobs</a>
    <a href="#" data-page="messages.html">Messages</a>
    <a href="#" data-page="settings.html">⚙️</a>
    <a href="#" id="sign-out">Sign Out</a>

    <select id="role-dropdown">
      <option value="customer">Customer</option>
      <option value="provider">Provider</option>
      <option value="agent">Agent</option>
    </select>
  </div>

  <div class="page-content">
    <h1>Allocate Jobs</h1>

    <button onclick="loadContractors()">Load Contractors</button>

    <select id="contractor-dropdown">
      <option value="">Select contractor</option>
    </select>

    <br><br>

    <button onclick="loadAvailableJobs()">Load Available Jobs</button>

    <select id="jobs-dropdown">
      <option value="">Select job</option>
    </select>

    <div id="jobs-list"></div>
  </div>

  <script src="navigation.js"></script>

  <script>
    async function loadContractors() {
      const agent_id = localStorage.getItem("user_id");
      const contractorDropdown = document.getElementById("contractor-dropdown");

      if (!agent_id) {
        contractorDropdown.innerHTML = `<option value="">Could not load contractors</option>`;
        return;
      }

      const response = await fetch("https://ofxmxfwibvhvlhgirxfd.supabase.co/functions/v1/get-contractors", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          agent_id: agent_id
        })
      });

      if (!response.ok) {
        contractorDropdown.innerHTML = `<option value="">Could not load contractors</option>`;
        return;
      }

      const data = await response.json();

      if (!data.contractors || data.contractors.length === 0) {
        contractorDropdown.innerHTML = `<option value="">No contractors added yet</option>`;
        return;
      }

      contractorDropdown.innerHTML = `<option value="">Select contractor</option>`;

      data.contractors.forEach(function (contractor) {
        const option = document.createElement("option");

        option.value = contractor.user_id;
        option.textContent = contractor.user.name + " - " + contractor.user.email;

        contractorDropdown.appendChild(option);
      });
    }

    async function loadAvailableJobs() {

      const response = await fetch(
        "https://ofxmxfwibvhvlhgirxfd.supabase.co/functions/v1/get-all-jobs",
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          }
        }
      );

      const jobs = await response.json();

      let html = "";

      const jobsDropdown = document.getElementById("jobs-dropdown");

      jobsDropdown.innerHTML = `<option value="">Select job</option>`;

      jobs.forEach(job => {

        const option = document.createElement("option");

        option.value = job.job_id;
        option.textContent = job.job_id;

        jobsDropdown.appendChild(option);

        html += `
          <div>
            <p><strong>Job ID:</strong> ${job.job_id}</p>
            <p><strong>Description:</strong> ${job.description}</p>
            <p><strong>Status:</strong> ${job.status}</p>
            <hr>
          </div>
        `;
      });

      document.getElementById("jobs-list").innerHTML = html;
    }
  </script>

</body>
</html>
