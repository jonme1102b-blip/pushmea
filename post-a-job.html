<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Post a Job</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="top-menu">
    <a href="#" data-page="my-profile.html">My Profile</a>
    <a href="#" data-page="my-jobs.html">My Jobs</a>
    <a href="#" data-page="post-a-job.html">Post a Job</a>
    <a href="#" data-page="allocate-jobs.html">Allocate Jobs</a>
    <a href="#" data-page="available-jobs.html">Available Jobs</a>
    <a href="#" data-page="messages.html">Messages</a>
    <a href="#" data-page="settings.html">⚙️</a>
    <a href="#" id="sign-out">Sign Out</a>

    <select id="role-dropdown">
      <option value="customer">Customer</option>
      <option value="provider">Provider</option>
      <option value="agent">Agent</option>
    </select>
  </div>

  <div class="page-content">
    <h1>Post a Job</h1>

    <div>
      <label for="trade-dropdown">Trade</label>
      <br><br>

      <select id="trade-dropdown">
        <option value="">Loading trades...</option>
      </select>
    </div>

    <br><br>

    <div>
      <label for="job-description">Job Description</label>
      <br><br>

      <textarea
        id="job-description"
        rows="10"
        cols="60"
        placeholder="Describe the job here..."
      ></textarea>
    </div>

    <br><br>

    <button id="post-job-button">
      Post Job
    </button>

    <br><br>

    <div id="message"></div>
  </div>

  <script src="navigation.js"></script>

  <script>
    async function loadTrades() {
      const tradeDropdown = document.getElementById("trade-dropdown");

      const response = await fetch("https://ofxmxfwibvhvlhgirxfd.supabase.co/functions/v1/get-trades");

      if (!response.ok) {
        tradeDropdown.innerHTML = '<option value="">Could not load trades</option>';
        return;
      }

      const data = await response.json();

      tradeDropdown.innerHTML = '<option value="">Select a trade</option>';

      data.trades.forEach(function (trade) {
        const option = document.createElement("option");
        option.value = trade.trade_id;
        option.textContent = trade.trade_name;
        tradeDropdown.appendChild(option);
      });
    }

    async function postJob() {
      const author_id = localStorage.getItem("user_id");
      const trade_id = document.getElementById("trade-dropdown").value;
      const description = document.getElementById("job-description").value;
      const message = document.getElementById("message");

      if (!author_id || !trade_id || !description) {
        message.textContent = "Please complete all fields.";
        return;
      }

      const response = await fetch("https://ofxmxfwibvhvlhgirxfd.supabase.co/functions/v1/post-job", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          author_id: author_id,
          trade_id: trade_id,
          description: description
        })
      });

      if (!response.ok) {
        message.textContent = "Job could not be posted.";
        return;
      }

      message.textContent = "Job posted successfully";
    }

    document.addEventListener("DOMContentLoaded", function () {
      loadTrades();

      document
        .getElementById("post-job-button")
        .addEventListener("click", postJob);
    });
  </script>

</body>
</html>
