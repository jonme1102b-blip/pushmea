<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Post a Job</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="top-menu">
    <a href="#" data-page="my-profile.html">My Profile</a>
    <a href="#" data-page="my-jobs.html">My Jobs</a>
    <a href="#" data-page="post-a-job.html">Post a Job</a>
    <a href="#" data-page="allocate-jobs.html">Allocate Jobs</a>
    <a href="#" data-page="available-jobs.html">Available Jobs</a>
    <a href="#" data-page="messages.html">Messages</a>
    <a href="#" data-page="settings.html">⚙️</a>
    <a href="#" id="sign-out">Sign Out</a>

    <select id="role-dropdown">
      <option value="customer">Customer</option>
      <option value="provider">Provider</option>
      <option value="agent">Agent</option>
    </select>
  </div>

  <div class="page-content">
    <h1>Post a Job</h1>

    <div>
      <label for="trade-dropdown">Trade</label>
      <br><br>

      <select id="trade-dropdown">
        <option value="">Loading trades...</option>
      </select>
    </div>

    <br><br>

    <div>
      <label for="job-description">Job Description</label>
      <br><br>

      <textarea
        id="job-description"
        rows="10"
        cols="60"
        placeholder="Describe the job here..."
      ></textarea>
    </div>

    <br><br>

    <button id="post-job-button">
      Post Job
    </button>

    <br><br>

    <div id="message"></div>
  </div>

  <script src="navigation.js"></script>

</body>
</html>
