<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Signup</title>
</head>
<body>

  <div>
    <div><input id="name" type="text" placeholder="Name"></div>
    <div>
      <select id="usertype">
        <option value="agency">agency</option>
        <option value="customer">customer</option>
        <option value="provider">provider</option>
      </select>
    </div>
    <div><input id="email" type="text" placeholder="Email"></div>
    <div><input id="password" type="password" placeholder="Password"></div>
    <div><button onclick="signup()">Sign Up</button></div>
  </div>

  <script>
    async function signup() {
      const name = document.getElementById("name").value;
      const usertype = document.getElementById("usertype").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      await fetch("https://ofxmxfwibvhvlhgirxfd.supabase.co/functions/v1/signup", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          name: name,
          email: email,
          password: password
        })
      });

      let message = "";
      if (usertype === "agency") message = "welcome agent";
      if (usertype === "customer") message = "welcome customer";
      if (usertype === "provider") message = "welcome provider";

      alert(message);
    }
  </script>

</body>
</html>
