<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">

  <title>
    Signup and Login
  </title>

  <link
    rel="stylesheet"
    href="styles.css">

  <link
    rel="stylesheet"
    href="ui/index.css">

</head>

<body>

  <header class="top-nav">

  </header>


  <section class="hero">

    <section class="hero-left">

      <section class="hero-text">

      </section>


      <section class="signup-region">

        <h2>
          Sign Up
        </h2>

        <div>

          <input
            id="name"
            type="text"
            placeholder="Name">

        </div>

        <div>

          <input
            id="username"
            type="text"
            placeholder="Username">

        </div>

        <div>

          <select id="role">

            <option value="agent">
              agent
            </option>

            <option value="customer">
              customer
            </option>

            <option value="provider">
              provider
            </option>

          </select>

        </div>

        <div>

          <input
            id="email"
            type="text"
            placeholder="Email">

        </div>

        <div>

          <input
            id="password"
            type="password"
            placeholder="Password">

        </div>

        <div>

          <button
            onclick="signup()">

            Sign Up

          </button>

        </div>

      </section>

    </section>


    <section class="hero-image">

      <img
        src="images/hero.png"
        alt="SortMea hero image">

    </section>

  </section>


  <section class="login-region">

    <h2>

      Log In

    </h2>

    <div>

      <input
        id="login-email"
        type="text"
        placeholder="Username">

    </div>

    <div>

      <input
        id="login-password"
        type="password"
        placeholder="Password">

    </div>

    <div>

      <button
        onclick="login()">

        Log In

      </button>

    </div>

  </section>


  <section class="how-it-works">

  </section>


  <script src="signup.js"></script>

</body>

</html>
