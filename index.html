<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>
Signup and Login
</title>

<link
rel="stylesheet"
href="styles.css">

<link
rel="stylesheet"
href="ui/index.css">

</head>

<body>


<header class="top-nav">

<div class="brand">

<div class="brand-icon">

👜

</div>

<div class="brand-text">

Sortmea

</div>

</div>


<div class="nav-links">

<a href="#how">
How It Works
</a>

<a href="#">
For Professionals
</a>

<a href="#">
About
</a>

<button
class="nav-login">

Sign In

</button>

</div>

</header>



<section class="hero">


<section class="hero-left">


<div class="hero-badge">

Trusted by local businesses and professionals

</div>


<section class="hero-text">

<h1>

Connect with trusted
service professionals
and get the job done.

</h1>

<p>

Post your job,
receive competitive quotes,
and hire with confidence.

</p>

</section>



<section class="signup-region">

<h2>

Create your account

</h2>


<div>

<input
id="name"
type="text"
placeholder="Full Name">

</div>


<div>

<select id="role">

<option value="agent">

I am a…

</option>

<option value="customer">

customer

</option>

<option value="provider">

provider

</option>

</select>

</div>


<div>

<input
id="username"
type="text"
placeholder="Username">

</div>


<div>

<input
id="email"
type="text"
placeholder="Email Address">

</div>


<div>

<input
id="password"
type="password"
placeholder="Password">

</div>


<div>

<button
onclick="signup()">

Sign Up

</button>

</div>

</section>

</section>



<section class="hero-image">

<img
src="images/3 amigos.png"
alt="SortMea hero image">

</section>


</section>



<section
class="how-it-works"
id="how">

</section>



<section
class="login-region">

<h2>

Log In

</h2>


<div>

<input
id="login-email"
type="text"
placeholder="Username">

</div>


<div>

<input
id="login-password"
type="password"
placeholder="Password">

</div>


<div>

<button
onclick="login()">

Log In

</button>

</div>

</section>



<script src="signup.js"></script>

</body>

</html>
