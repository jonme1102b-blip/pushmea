<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Signup</title>
</head>
<body>

  <div>
    <div><input id="name" type="text" placeholder="Name"></div>
    <div>
      <select id="role">
        <option value="agent">agent</option>
        <option value="customer">customer</option>
        <option value="provider">provider</option>
      </select>
    </div>
    <div><input id="email" type="text" placeholder="Email"></div>
    <div><input id="password" type="password" placeholder="Password"></div>
    <div><button onclick="signup()">Sign Up</button></div>
  </div>

  <script>
    async function signup() {
      const name = document.getElementById("name").value;
      const role = document.getElementById("role").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      if (!name || !role || !email || !password) {
        alert("Please fill in all fields.");
        return;
      }

      await fetch("https://ofxmxfwibvhvlhgirxfd.supabase.co/functions/v1/signup", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          name: name,
          role: role,
          email: email,
          password: password
        })
      });

      alert("welcome " + role);
    }
  </script>

</body>
</html>
