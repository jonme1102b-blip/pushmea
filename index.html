<!DOCTYPE html>

<html>

<head>

  <meta charset="UTF-8">

  <title>
    Signup and Login
  </title>

  <link
    rel="stylesheet"
    href="styles.css">

  <link
    rel="stylesheet"
    href="ui/index.css">

</head>

<body>


  <header class="top-nav">

    <div class="brand">

      <div class="brand-icon">

        👜

      </div>

      <div class="brand-text">

        Sortmea

      </div>

    </div>

  </header>



  <section class="hero">


    <section class="hero-left">


      <section class="hero-text">

        <div class="hero-badge">

          Trusted by local businesses and professionals

        </div>


        <h1>

          Connect with trusted
          service professionals.

        </h1>


        <p>

          Post your job, receive quotes,
          and hire with confidence.

        </p>

      </section>



      <section class="signup-region">

        <h2>

          Sign Up

        </h2>


        <div>

          <input
            id="name"
            type="text"
            placeholder="Name">

        </div>


        <div>

          <input
            id="username"
            type="text"
            placeholder="Username">

        </div>


        <div>

          <select id="role">

            <option value="agent">
              agent
            </option>

            <option value="customer">
              customer
            </option>

            <option value="provider">
              provider
            </option>

          </select>

        </div>


        <div>

          <input
            id="email"
            type="text"
            placeholder="Email">

        </div>


        <div>

          <input
            id="password"
            type="password"
            placeholder="Password">

        </div>


        <div>

          <button
            onclick="signup()">

            Sign Up

          </button>

        </div>

      </section>



      <section class="login-inline">

        <div class="login-inline-title">

          Already have an account?

        </div>


        <div class="login-inline-fields">

          <input
            id="login-email"
            type="text"
            placeholder="Username">


          <input
            id="login-password"
            type="password"
            placeholder="Password">


          <button
            onclick="login()">

            Log In

          </button>

        </div>

      </section>


    </section>



    <section class="hero-image">

      <img
        src="images/3 amigos.png"
        alt="SortMea hero image">

    </section>


  </section>



  <section class="how-it-works">

  </section>


  <script src="signup.js"></script>

</body>

</html>
